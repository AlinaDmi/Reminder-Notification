spring:
  datasource:
    url: jdbc:h2:mem:reminderdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  task:
    scheduling:
      enabled: false

reminder:
  max-attempts: 3
  retry-delay-seconds: 1
  scheduler-delay-ms: 1000
  webhook-timeout-ms: 1000
  async:
    core-pool-size: 2
    max-pool-size: 2
    queue-capacity: 10
    thread-name-prefix: test-reminder-
